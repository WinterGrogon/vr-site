<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Форма для регистрации заказа</title>
    <link rel="shortcut icon" href="../img/favicon.ico" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <div class="container form-container">
        <div class="title">
            <h2>Оформить <br> заказ</h2>
            <hr>
        </div>

        <form class="form">
            <div class="form-group">
                <label class="form__label" for="email">Email</label>
                <input type="email" class="form-control" id="email" aria-describedby="emailHelp"
                    placeholder="sample@mail.com">
            </div>

            <div class="form-group">
                <label class="form__label" for="address">Адрес</label>
                <input type="text" class="form-control" id="address" placeholder="Санкт-Петербург, ул Московская 23">
            </div>

            <div class="form-group">
                <p class="form__label">Добавить к заказу</p>

                <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="" id="addCase">
                    <label class="form-check-label" for="addCase">
                        Кейс
                    </label>
                </div>

                <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="" id="addFrame">
                    <label class="form-check-label" for="addFrame">
                        Оправу
                    </label>
                </div>

                <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="" id="addCable">
                    <label class="form-check-label" for="addCable">
                        Кабель для зарядки
                    </label>
                </div>

                <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="" id="addWirelessCharger">
                    <label class="form-check-label" for="addWirelessCharger">
                        Беспроводная зарядка
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label class="form__label" for="contryInput">Страна доставки</label>
                <input type="text" name="country" id="contryInput" class="form-control" placeholder="Россия">
            </div>

            <button type="submit" class="btn btn-primary">Оформить</button>
        </form>
    </div>
</body>

</html>
